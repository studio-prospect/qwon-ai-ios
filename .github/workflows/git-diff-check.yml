# Fail PRs that introduce trailing whitespace or conflict markers (git diff --check).
name: Git diff check

on:
  pull_request:

permissions:
  contents: read

jobs:
  diff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: git diff --check
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff --check "origin/${{ github.base_ref }}...HEAD"
